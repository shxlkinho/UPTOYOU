<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Up To You - Il Test di Orientamento Definitivo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #ff6600; 
            --primary-light: #ff8533;
            --bg: #0a0a0a; 
            --card: #1a1a1a; 
            --text: #e0e0e0;
            --accent: #4facfe;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            padding: 20px;
        }

        .quiz-container { 
            max-width: 800px; 
            width: 100%; 
            background: var(--card); 
            padding: 40px; 
            border-radius: 30px; 
            border: 1px solid #333; 
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
            position: relative;
            overflow: hidden;
        }

        .progress-container { margin-bottom: 30px; }
        .progress-bar { width: 100%; height: 8px; background: #222; border-radius: 10px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--accent), var(--primary)); }
        .step-info { font-size: 0.8rem; color: #666; margin-top: 8px; text-transform: uppercase; letter-spacing: 1px; }

        .question-box { min-height: 120px; }
        .question-box h2 { font-size: 1.6rem; font-weight: 600; line-height: 1.4; margin-bottom: 25px; color: #fff; }

        .options { display: grid; gap: 15px; }
        .options button { 
            background: #252525; 
            border: 1px solid #333; 
            color: #ccc; 
            padding: 18px 25px; 
            border-radius: 15px; 
            cursor: pointer; 
            text-align: left; 
            font-size: 1rem;
            display: flex;
            align-items: center;
        }

        .options button:hover { 
            background: #333; 
            border-color: var(--primary); 
            color: #fff; 
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255,102,0,0.2);
        }

        .nav-buttons { display: flex; justify-content: space-between; margin-top: 30px; align-items: center; }
        .btn-back { background: transparent; border: 1px solid #444; color: #888; padding: 10px 20px; border-radius: 10px; cursor: pointer; visibility: hidden; }
        .btn-back.visible { visibility: visible; }
        .btn-back:hover { border-color: #666; color: #fff; }

        #result { display: none; text-align: center; animation: fadeIn 0.8s ease forwards; }
        .result-title { font-size: 2rem; margin-bottom: 30px; background: linear-gradient(90deg, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .result-card { 
            background: #222; 
            border-radius: 20px; 
            padding: 25px; 
            margin-bottom: 20px; 
            text-align: left; 
            border-left: 5px solid var(--primary);
            position: relative;
        }
        .result-card.top { border-left-color: gold; background: #2a2a2a; }
        .rank { position: absolute; top: 15px; right: 20px; font-size: 0.7rem; color: var(--primary); font-weight: bold; text-transform: uppercase; }
        .result-card h3 { margin: 0 0 10px 0; color: #fff; font-size: 1.4rem; }
        .result-card p { margin: 0; font-size: 0.95rem; color: #aaa; line-height: 1.5; }

        .restart-btn { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 15px 40px; 
            border-radius: 15px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 20px; 
            font-size: 1rem;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="quiz-ui">
        <div class="progress-container">
            <div class="progress-bar"><div id="progress-fill"></div></div>
            <div class="step-info" id="step-info">Domanda 1 di 30</div>
        </div>
        
        <div class="question-box">
            <h2 id="q-text">Caricamento test...</h2>
        </div>

        <div class="options" id="q-options"></div>

        <div class="nav-buttons">
            <button class="btn-back" id="back-btn" onclick="goBack()">← Domanda precedente</button>
        </div>
    </div>

    <div id="result">
        <h2 class="result-title">Il tuo futuro inizia qui 🚀</h2>
        <div id="results-list"></div>
        <button class="restart-btn" onclick="location.reload()">Rifai il test</button>
        <p style="margin-top:20px; font-size: 0.8rem; color: #444;">Analisi basata sui macro-indirizzi ufficiali del Ministero dell'Istruzione</p>
    </div>
</div>

        { q: "Ti interessa come funzionano le leggi e lo Stato?", a: [{t:"Sì, è fondamentale.", p:{AFM:2, CL:2, SU:2}}, {t:"Più o meno, preferisco la gestione pratica.", p:{COM:2}}, {t:"No, preferisco le leggi della fisica.", p:{SC:3}}, {t:"No, preferisco la natura.", p:{AGR:1}}, {t:"No, sono uno spirito artistico.", p:{AR:1}}] },
        { q: "Qual è il tuo rapporto con il cibo?", a: [{t:"Amo cucinare per gli altri.", p:{ALB:3}}, {t:"Mi interessa la qualità chimica degli alimenti.", p:{CHI:3, AGR:2}}, {t:"Mi interessa il business legato al cibo.", p:{AFM:1, TUR:1}}, {t:"Lo vedo come fonte di salute e benessere.", p:{SOC:1}}, {t:"Mi piace fotografarlo e curarne l'estetica.", p:{GRA:2}}] },
        { q: "Cosa pensi del disegno?", a: [{t:"Disegno a mano libera continuamente.", p:{AR:3}}, {t:"Preferisco il disegno tecnico al computer (CAD).", p:{CAT:3, MEC:2}}, {t:"Mi interessa la grafica pubblicitaria.", p:{GRA:3}}, {t:"Disegno schemi elettrici o grafici di dati.", p:{ELE:2, SC:1}}, {t:"Non so disegnare.", p:{CL:1, SU:1}}] },
        { q: "Quale libro sceglieresti in biblioteca?", a: [{t:"Un grande classico della letteratura.", p:{CL:3}}, {t:"Un saggio sulla psicologia infantile.", p:{SU:3}}, {t:"Un manuale di programmazione o robotica.", p:{INF:3, ELE:2}}, {t:"Una rivista di viaggi e culture.", p:{TUR:3, LI:1}}, {t:"Un libro di ricette o tecniche culinarie.", p:{ALB:3}}] },
        { q: "Ti piacerebbe lavorare in ambito sanitario?", a: [{t:"Sì, come tecnico (es. protesi o occhiali).", p:{SAN:3}}, {t:"Sì, assistendo direttamente i pazienti.", p:{SOC:3}}, {t:"Solo come ricercatore in laboratorio.", p:{CHI:2, SC:2}}, {t:"No, preferisco altri settori.", p:{MEC:1, AFM:1}}, {t:"Mi interessa lo sport e la fisioterapia.", p:{SC:3, SOC:1}}] },
        { q: "Come ti vedi tra 10 anni?", a: [{t:"In un ufficio di una grande banca.", p:{AFM:3}}, {t:"Sotto un aereo a controllare i motori.", p:{TRA:3, MAN:2}}, {t:"In una sartoria d'alta moda.", p:{MOD:3}}, {t:"In classe a insegnare.", p:{SU:2, CL:2}}, {t:"In un laboratorio biotecnologico.", p:{CHI:3}}] },
        { q: "Quale strumento preferiresti saper usare?", a: [{t:"Il pianoforte o il violino.", p:{MU:3}}, {t:"La macchina da cucire professionale.", p:{MOD:3}}, {t:"Il trapano a colonna o il tornio.", p:{MEC:3, MAN:2}}, {t:"Lo scalpello o il pennello.", p:{AR:3}}, {t:"Il software Excel per i conti.", p:{AFM:3}}] },
        { q: "Ti interessa l'ecologia?", a: [{t:"Sì, vorrei studiare energie rinnovabili.", p:{ELE:2, MEC:2, CAT:2}}, {t:"Sì, attraverso l'agricoltura bio.", p:{AGR:3}}, {t:"Sì, studiando i cambiamenti chimici dell'aria.", p:{CHI:3, SC:1}}, {t:"Mi interessa l'impatto economico del green.", p:{AFM:2}}, {t:"Mi interessa sensibilizzare le persone.", p:{SU:2}}] },
        { q: "Cosa ne pensi della musica?", a: [{t:"È la mia vita, suono uno strumento.", p:{MU:3}}, {t:"Amo la tecnologia audio e il DJing.", p:{ELE:2, INF:1}}, {t:"Mi piace la storia della musica e dell'arte.", p:{AR:1, CL:1}}, {t:"La ascolto solo come sottofondo.", p:{SC:1, AFM:1}}, {t:"Mi piace ballare.", p:{MU:3}}] },
        { q: "Ti piace organizzare eventi?", a: [{t:"Sì, curando l'accoglienza e il cibo.", p:{ALB:3, TUR:2}}, {t:"Sì, gestendo la promozione e il budget.", p:{AFM:2, COM:3}}, {t:"Sì, occupandomi delle luci e dei suoni.", p:{ELE:3}}, {t:"Preferisco partecipare senza responsabilità.", p:{SC:1, CL:1}}, {t:"Sì, curando le scenografie.", p:{AR:2}}] },
        { q: "Sei una persona precisa?", a: [{t:"Man maniacale, tutto deve essere al millimetro.", p:{CAT:3, SAN:3, MEC:2}}, {t:"Abbastanza, soprattutto nei calcoli.", p:{AFM:2, SC:2}}, {t:"Sono più per l'ispirazione del momento.", p:{AR:2, MU:2}}, {t:"Sono preciso nei rapporti con gli altri.", p:{SU:2}}, {t:"Dipende da cosa sto facendo.", p:{INF:1, LI:1}}] },
        { q: "Come gestisci lo stress?", a: [{t:"Analizzo il problema freddamente.", p:{SC:2, INF:2}}, {t:"Mi sfogo con l'attività fisica o sport.", p:{SC:2}}, {t:"Cucinando o mangiando qualcosa di buono.", p:{ALB:2}}, {t:"Disegnando o ascoltando musica.", p:{AR:2, MU:2}}, {t:"Chiedo consiglio a un amico.", p:{SU:3}}] },
        { q: "Ti affascina lo spazio e l'astronomia?", a: [{t:"Sì, vorrei capire la fisica delle stelle.", p:{SC:3}}, {t:"Mi interessa la tecnologia dei razzi.", p:{MEC:3, ELE:2}}, {t:"Lo vedo come un tema poetico o artistico.", p:{CL:1, AR:1}}, {t:"No, preferisco i problemi della Terra.", p:{AFM:1, SOC:1}}, {t:"Mi interessa la navigazione satellitare.", p:{TRA:3}}] },

        { q: "Ti interessa la biologia umana?", a: [{t:"Sì, vorrei fare medicina.", p:{SC:3, CHI:2}}, {t:"Sì, vorrei lavorare nel sociale.", p:{SOC:3, SU:2}}, {t:"Mi interessa come fabbricare protesi.", p:{SAN:3, MEC:1}}, {t:"Solo a livello sportivo.", p:{SC:2}}, {t:"No, preferisco le macchine.", p:{MEC:3}}] },
        { q: "Preferiresti scrivere...", a: [{t:"Un romanzo o una poesia.", p:{CL:3, LI:1}}, {t:"Un articolo di economia.", p:{AFM:3}}, {t:"Un codice software.", p:{INF:3}}, {t:"Un manuale d'istruzioni tecniche.", p:{MEC:2, ELE:2}}, {t:"Un diario psicologico.", p:{SU:3}}] },
        { q: "Quale di questi 'superpoteri' vorresti?", a: [{t:"Parlare ogni lingua del mondo.", p:{LI:3, TUR:2}}, {t:"Riparare qualsiasi cosa istantaneamente.", p:{MAN:3, MEC:2, ELE:2}}, {t:"Prevedere le oscillazioni della borsa.", p:{AFM:3}}, {t:"Leggere nel pensiero delle persone.", p:{SU:3, SOC:1}}, {t:"Creare capolavori d'arte con un tocco.", p:{AR:3, GRA:2}}] }
    ];

    let currentStep = 0;
    let score = { 
        CL:0, SC:0, LI:0, SU:0, AR:0, MU:0, 
        INF:0, MEC:0, ELE:0, CAT:0, AGR:0, CHI:0, GRA:0, MOD:0, TRA:0, AFM:0, TUR:0, 
        ALB:0, SOC:0, MAN:0, MID:0, COM:0, SAN:0 
    };
    let uniChoice = "forse";
    let history = [];

    function loadQuestion() {
        const q = questions[currentStep];
        document.getElementById("step-info").innerText = `Domanda ${currentStep + 1} di ${questions.length}`;
        document.getElementById("progress-fill").style.width = `${((currentStep) / questions.length) * 100}%`;
        document.getElementById("q-text").innerText = q.q;
        
        const optionsBox = document.getElementById("q-options");
        optionsBox.innerHTML = "";
        
        q.a.forEach(ans => {
            const btn = document.createElement("button");
            btn.innerText = ans.t;
            btn.onclick = () => selectOption(ans);
            optionsBox.appendChild(btn);
        });

        const backBtn = document.getElementById("back-btn");
        if(currentStep > 0) backBtn.classList.add("visible");
        else backBtn.classList.remove("visible");
    }

    function selectOption(ans) {
        history.push({ step: currentStep, score: {...score}, uni: uniChoice });
        
        if(questions[currentStep].type === "uni") {
            uniChoice = ans.v;
        } else {
            for(let key in ans.p) {
                score[key] += ans.p[key];
            }
        }

        currentStep++;
        if(currentStep < questions.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function goBack() {
        if(currentStep > 0) {
            const lastState = history.pop();
            currentStep = lastState.step;
            score = lastState.score;
            uniChoice = lastState.uni;
            loadQuestion();
        }
    }

    const descriptions = {
        CL: { n: "Liceo Classico", d: "Latino, greco, letteratura e filosofia. Per chi vuole una cultura vastissima e basi critiche imbattibili." },

        ELE: { n: "Tecnico Elettronica", d: "Robotica e automazione. Per dare vita agli oggetti intelligenti di domani." },
        CAT: { n: "Tecnico CAT (Geometra)", d: "Costruzioni e territorio. Per chi vuole progettare case e gestire l'ambiente." },
        AGR: { n: "Tecnico Agraria", d: "Gestione agricola e qualità del cibo. L'innovazione che nasce dalla terra." },
        CHI: { n: "Tecnico Chimica e Biotec", d: "Analisi di laboratorio e farmaceutica. Per chi vuole scoprire i segreti della materia." },
        GRA: { n: "Tecnico Grafica e Comunicazione", d: "Design digitale, video e stampa. Per chi vuole comunicare nel XXI secolo." },
        MOD: { n: "Tecnico Moda", d: "Design e produzione tessile. Il cuore creativo del Made in Italy industriale." },
        TRA: { n: "Tecnico Trasporti e Logistica", d: "Navigazione e Aeronautica. Per chi vuole gestire il movimento globale." },
        AFM: { n: "Tecnico AFM (Ragioneria)", d: "Economia, finanza e marketing. Per diventare i manager del domani." },
        TUR: { n: "Tecnico per il Turismo", d: "Gestione di servizi e lingue per il business del viaggio." },
        ALB: { n: "Professionale Alberghiero", d: "Cucina, sala e accoglienza. Per i futuri chef e leader dell'ospitalità." },
        SOC: { n: "Professionale Socio-Sanitario", d: "Assistenza e benessere delle persone. Un lavoro fatto di cuore e competenza." },

        COM: { n: "Professionale Servizi Commerciali", d: "Vendite, marketing e supporto amministrativo pratico." },
        SAN: { n: "Professionale Arti Sanitarie", d: "Odontotecnico (protesi) o Ottico. Tecnologia e precisione per la salute." }
    };

    function showResults() {
        document.getElementById("quiz-ui").style.display = "none";
        document.getElementById("result").style.display = "block";
        document.getElementById("progress-fill").style.width = "100%";

        // Boost basato sull'università
        if(uniChoice === "si") {
            for(let k in score) if(["CL","SC","LI","SU","AR","MU"].includes(k)) score[k] += 15;
        } else if(uniChoice === "no") {
            for(let k in score) if(["ALB","SOC","MAN","MID","COM","SAN"].includes(k)) score[k] += 15;
        }

        let sorted = Object.entries(score).sort((a,b) => b[1] - a[1]);
        const top3 = sorted.slice(0, 3);
        
        const list = document.getElementById("results-list");
        list.innerHTML = "";

        top3.forEach((m, i) => {
            const data = descriptions[m[0]];
            const isTop = i === 0;
            list.innerHTML += `
                <div class="result-card ${isTop ? 'top' : ''}">
                    <span class="rank">${i === 0 ? 'Miglior Match' : 'Alternativa'}</span>
                    <h3>${data.n}</h3>
                    <p>${data.d}</p>
                </div>
            `;
        });
    }

    loadQuestion();
</script>
