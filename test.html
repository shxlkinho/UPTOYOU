    function shuffleArray(array) {
        let curId = array.length;
        while (0 !== curId) {
            let randId = Math.floor(Math.random() * curId);
            curId -= 1;
            let tmp = array[curId];
            array[curId] = array[randId];
            array[randId] = tmp;
        }
        return array;
    }

    function initQuiz() {
        const firstQuestion = {
            q: "Prima di iniziare: pensando al tuo futuro dopo il diploma, cosa immagini?",
            type: "uni",
            a: [
                { t: "Voglio assolutamente andare all'Università.", v: "si" },
                { t: "Voglio imparare un mestiere pratico e lavorare subito.", v: "no" },
                { t: "Non lo so ancora, vorrei tenermi aperte tutte le strade.", v: "forse" }
            ]
        };
        questionQueue = [firstQuestion, ...shuffleArray([...baseQuestions])];
        loadQuestion();
    }

    function loadQuestion() {
        const q = questionQueue[currentStep];
        const totalEstimated = questionQueue.length;
        
        const progressPercent = (currentStep / totalEstimated) * 100;
        document.getElementById("progress-fill").style.width = `${progressPercent}%`;
        document.getElementById("q-text").innerText = q.q;
        
        const optionsBox = document.getElementById("q-options");
        optionsBox.innerHTML = "";
        
        q.a.forEach(ans => {
            const btn = document.createElement("button");
            btn.innerText = ans.t;
            btn.onclick = () => selectOption(ans, q);
            optionsBox.appendChild(btn);
        });

        const backBtn = document.getElementById("back-btn");
        if(currentStep > 0) backBtn.classList.add("visible");
        else backBtn.classList.remove("visible");
    }

    function selectOption(ans, q) {
        history.push({ 
            step: currentStep, 
            score: JSON.parse(JSON.stringify(score)),
            branchScores: JSON.parse(JSON.stringify(branchScores)),
            generalQuestionsAnswered,
            branchesTriggered,
            uni: uniChoice,
            queueSnapshot: [...questionQueue],
            askedQuestionsSnapshot: new Set(askedQuestions)
        });
        
        askedQuestions.add(q.q);

        if (q.type === "uni") {
            uniChoice = ans.v;
        } else {
            if (ans.p) {
                for(let key in ans.p) score[key] += ans.p[key];
            }
            if (q.isGeneral) {
                generalQuestionsAnswered++;
                if (ans.trigger) branchScores[ans.trigger] += 3; // Assegnazione punti per macro-area
            }
        }

        // LOGICA DI DIRAMAZIONE (Dopo 11 domande generali e solo 1 volta)
        if (generalQuestionsAnswered === 11 && !branchesTriggered) {
            branchesTriggered = true;
            
            // Ordina i branch in base al punteggio accumulato
            let sortedBranches = Object.entries(branchScores).sort((a,b) => b[1] - a[1]);
            let best1 = sortedBranches[0];
            let best2 = sortedBranches[1];
            
            let branchesToQueue = [];
            // Se i punteggi più alti distano di 3 punti o meno, mostra 2 diramazioni. Altrimenti solo la prima.
            if ((best1[1] - best2[1]) <= 3) {
                branchesToQueue.push(best1[0], best2[0]);
            } else {
                branchesToQueue.push(best1[0]);
            }

            let newQuestions = [];
            branchesToQueue.forEach(branchKey => {
                if(branchData[branchKey]) {
                    newQuestions = newQuestions.concat(shuffleArray([...branchData[branchKey]]));
                }
            });

            // Inserisce le domande specifiche nel flusso corrente, mettendo in pausa le rimanenti domande generali
            const nextIndex = currentStep + 1;
            questionQueue.splice(nextIndex, 0, ...newQuestions);
        }

        currentStep++;
        
        while (currentStep < questionQueue.length && askedQuestions.has(questionQueue[currentStep].q)) {
            currentStep++;
        }

        if (currentStep < questionQueue.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function goBack() {
        if(currentStep > 0) {
            const lastState = history.pop();
            currentStep = lastState.step;
            score = lastState.score;
            branchScores = lastState.branchScores;
            generalQuestionsAnswered = lastState.generalQuestionsAnswered;
            branchesTriggered = lastState.branchesTriggered;
            uniChoice = lastState.uni;
            questionQueue = lastState.queueSnapshot;
            askedQuestions = lastState.askedQuestionsSnapshot;
            loadQuestion();
        }
    }

    function getShortDescription(topMacro) {
        // Classifica sommaria basata sul miglior risultato
        if(['CL','SU','LES'].includes(topMacro)) return "Hai una marcata vocazione umanistico-sociale, supportata da forti doti empatiche e analitiche verso dinamiche relazionali, storiche o testuali.";
        if(['SC','SCA','CHI'].includes(topMacro)) return "Il tuo profilo rivela una solida attitudine logico-scientifica e un approccio mentale razionale rivolto al problem-solving e alla ricerca.";
        if(['INF','ELE','MEC','CAT'].includes(topMacro)) return "Mostri una predisposizione per l'universo tecnologico e progettuale, abbinando precisione strutturale a curiosità per l'innovazione hardware o software.";
        if(['AR','GRA','MOD','MU'].includes(topMacro)) return "Il tuo talento ruota attorno alla sintesi creativa ed estetica. Eccelli nella comunicazione visiva o performativa unita alla visione progettuale.";
        if(['AGR','SAN','SPO'].includes(topMacro)) return "La tua sfera d'interesse si connette strettamente al benessere umano, alla performance corporea o alla gestione della natura e della biologia.";
        if(['AFM','COM','TUR','LI'].includes(topMacro)) return "Risulti estremamente affine alle interazioni linguistiche, organizzative e strategico-commerciali; possiedi le basi per eccellere in mercati fluidi.";
        if(['MAN','MID','ALB','SOC','TRA'].includes(topMacro)) return "Possiedi una forte componente empirica e operativa. Sei attratto dal pragmatismo e dalla rapida applicazione in contesti tecnico-professionali.";
        return "Il tuo profilo risulta estremamente versatile e bilanciato, indicando flessibilità verso ambiti multidisciplinari.";
    }

    async function showResults() {
        document.getElementById("quiz-ui").style.display = "none";
        document.getElementById("result").style.display = "block";
        document.getElementById("progress-fill").style.width = "100%";

        const list = document.getElementById("results-list");
        list.innerHTML = "";

        let altMsg = "";
        if (score.ALTRO > (currentStep * 0.25)) {
            score.SC += 100;
            score.SU += 100;
            score.LES += 100;
            altMsg = `
                <div class="alert-generic">
                    <strong>💡 Abbiamo notato che hai risposto spesso "Altro/Non lo so".</strong><br>
                    Questo è normalissimo! Ti consigliamo vivamente di puntare su <b>Licei</b> o indirizzi più ampi e generici (come lo Scientifico o le Scienze Umane), che non ti vincolano a un mestiere specifico e ti lasciano tutte le porte aperte per capire con calma il tuo futuro.
                </div>
            `;
            list.innerHTML += altMsg;
        }

        if(uniChoice === "si") {
            for(let k in score) if(["CL","SC","SCA","SPO","LI","SU","LES","AR","MU"].includes(k)) score[k] += 20;
        } else if(uniChoice === "no") {
            for(let k in score) if(["ALB","SOC","MAN","MID","COM","SAN"].includes(k)) score[k] += 20;
        }

        delete score.ALTRO; 

        let sorted = Object.entries(score).sort((a,b) => b[1] - a[1]);
        const top3 = sorted.slice(0, 3);
        
        // Creazione breve psicodiagnosi
        const testDescription = getShortDescription(top3[0][0]);
        list.innerHTML += `<p style="color:var(--accent); font-weight:600; font-size:1.05rem; text-align:left; margin-bottom: 25px;">${testDescription}</p>`;

        const recommendedSchools = [];

        top3.forEach((m, i) => {
            const data = descriptions[m[0]];
            const isTop = i === 0;
            recommendedSchools.push(data.n);
            
            list.innerHTML += `
                <a href="OGdata/indirizzi/${data.link}" target="_blank" style="text-decoration: none; display: block;">
                    <div class="result-card ${isTop ? 'top' : ''}">
                        <span class="rank">${i === 0 ? 'Miglior Match' : 'Alternativa'}</span>
                        <h3>${data.n}</h3>
                        <p>${data.d}</p>
                        <div style="margin-top: 15px; font-size: 0.9rem; color: var(--accent); font-weight: 600;">
                            Clicca per esplorare la pagina dell'indirizzo &rarr;
                        </div>
                    </div>
                </a>
            `;
        });

        // SALVATAGGIO SU SUPABASE
        try {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                // Presupponendo l'esistenza di una colonna "test_results" o "profile_desc" nella tabella utenti
                const { error } = await supabaseClient
                    .from('profiles') // Modifica il nome tabella se nel tuo DB è diverso, ad es: 'users' o 'user_results'
                    .update({ 
                        top_3_schools: recommendedSchools, // Assicurati di avere colonne corrispondenti (Array)
                        test_description: testDescription  // Colonna di tipo text
                    })
                    .eq('id', session.user.id);
                
                if (error) console.error("Errore salvataggio risultati:", error.message);
                else console.log("Risultati salvati sull'account con successo.");
            } else {
                console.log("Utente non loggato, salvataggio skippato.");
            }
        } catch(e) {
            console.error("Errore di connessione Supabase nel salvataggio:", e);
        }
    }

    initQuiz();
</script>
