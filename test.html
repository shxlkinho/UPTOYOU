<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Up To You - Test Orientamento Avanzato</title>
    <style>
        :root { --primary: #ff6600; --bg: #0d0d0d; --card: #161616; --secondary: #4facfe; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .quiz-container { max-width: 650px; width: 95%; background: var(--card); padding: 30px; border-radius: 24px; border: 1px solid #333; box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; }
        
        .progress-bar { width: 100%; height: 6px; background: #222; border-radius: 10px; margin-bottom: 25px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--secondary), var(--primary)); transition: 0.4s; }
        
        .question { font-size: 1.4rem; font-weight: 600; margin-bottom: 20px; line-height: 1.4; color: #fff; min-height: 80px; }
        .options button { display: block; width: 100%; padding: 16px; margin: 10px 0; background: #1e1e1e; border: 1px solid #333; color: #ccc; border-radius: 12px; cursor: pointer; transition: 0.2s; text-align: left; font-size: 1rem; }
        .options button:hover { border-color: var(--primary); background: #252525; color: white; transform: translateX(5px); }
        
        .nav-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .btn-back { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; transition: 0.3s; }
        .btn-back:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-back:hover:not(:disabled) { background: #444; }

        #result { display: none; animation: fadeIn 0.6s ease-out; text-align: center; }
        .materia-tag { display: inline-block; background: rgba(255, 102, 0, 0.1); color: var(--primary); padding: 8px 18px; border-radius: 50px; margin: 5px; font-weight: bold; border: 1px solid var(--primary); font-size: 0.9rem; }
        .conclusion { font-size: 1.1rem; margin-top: 20px; color: #aaa; line-height: 1.5; }
        
        .close-final { background: var(--primary); border: none; color: white; padding: 15px 30px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 20px; width: 100%; font-size: 1.1rem; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="quiz">
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div class="question" id="q-text">Caricamento...</div>
        <div class="options" id="q-options"></div>
        <div class="nav-buttons">
            <button class="btn-back" id="back-btn" onclick="goBack()" disabled>← Indietro</button>
        </div>
    </div>

    <div id="result">
        <h2 style="font-size: 1.8rem; margin-bottom: 10px;">Analisi Completata 🎯</h2>
        <p style="color: #888;">Le tue aree di forza sono:</p>
        <div id="top-materie"></div>
        <div style="margin: 25px 0; height: 1px; background: #333;"></div>
        <p style="text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; color: var(--secondary); margin-bottom: 5px;">Percorso Consigliato</p>
        <h3 id="indirizzo-consigliato" style="color: white; font-size: 2rem; margin-top: 0;"></h3>
        <p class="conclusion" id="descrizione-indirizzo"></p>
        
        <button class="close-final" onclick="parent.postMessage('closeQuiz', '*')">Chiudi e torna alla Home</button>
        <p onclick="location.reload()" style="color: #555; cursor: pointer; margin-top: 15px; font-size: 0.9rem;">Rifai il test</p>
    </div>
</div>

<script>
    const questions = [
        { 
            q: "Ti viene affidato un progetto di gruppo. Quale ruolo scegli d'istinto?", 
            a: [
                {t:"Il coordinatore: gestisco scadenze e persone.", p:{E:3, H:1}}, 
                {t:"Il tecnico: mi occupo della realizzazione pratica o digitale.", p:{T:3, S:1}}, 
                {t:"L'ideatore: curo la parte creativa e estetica.", p:{A:3, U:1}}
            ] 
        },
        { 
            q: "Davanti a un problema tecnico (es. un'app che non va), come ti comporti?", 
            a: [
                {t:"Analizzo i dati e la logica per trovare l'errore.", p:{S:3, T:2}}, 
                {t:"Cerco un tutorial o smonto pezzi finché non funziona.", p:{T:3}}, 
                {t:"Chiedo a qualcuno spiegando il problema chiaramente.", p:{H:2, E:1}}
            ] 
        },
        { 
            q: "Quale di queste attività ti darebbe più soddisfazione?", 
            a: [
                {t:"Scrivere un racconto o analizzare un testo antico.", p:{U:3, A:1}}, 
                {t:"Progettare un piano per far guadagnare un'azienda.", p:{E:3}}, 
                {t:"Svolgere una ricerca di laboratorio su virus o stelle.", p:{S:3}}
            ] 
        },
        { 
            q: "In una discussione su temi sociali (es. ambiente o diritti):", 
            a: [
                {t:"Cerco di capire l'impatto psicologico sulle persone.", p:{H:3, U:1}}, 
                {t:"Cerco soluzioni economiche o politiche concrete.", p:{E:3, U:1}}, 
                {t:"Cerco dati scientifici che provino i fatti.", p:{S:3, T:1}}
            ] 
        },
        { 
            q: "Pensando al tuo futuro dopo la scuola superiore...", 
            type: "uni_check",
            a: [
                {t:"Voglio assolutamente andare all'Università.", val: true},
                {t:"Voglio imparare un mestiere e lavorare subito.", val: false}
            ] 
        },
        { 
            q: "Cosa trovi più stimolante studiare?", 
            a: [
                {t:"Come funzionano i mercati e il diritto.", p:{E:3}}, 
                {t:"L'evoluzione del pensiero umano e dell'arte.", p:{U:3, A:2}}, 
                {t:"L'anatomia umana o la fisica delle particelle.", p:{S:3, H:1}}
            ] 
        },
        { 
            q: "Se dovessi creare una tua Startup, di cosa si occuperebbe?", 
            a: [
                {t:"Sviluppo di software o hardware innovativo.", p:{T:3, S:1}}, 
                {t:"Consulenza d'immagine, moda o design.", p:{A:3, E:1}}, 
                {t:"Servizi di assistenza e benessere per la comunità.", p:{H:3, E:1}}
            ] 
        },
        { 
            q: "Immagina di dover riparare un oggetto rotto:", 
            a: [
                {t:"Leggo tutto il manuale teorico prima di toccarlo.", p:{S:2, U:1}}, 
                {t:"Inizio subito a provare combinazioni diverse.", p:{T:3, A:1}}, 
                {t:"Chiamo un amico esperto e collaboriamo.", p:{H:3, E:1}}
            ] 
        },
        { 
            q: "Cosa ti spaventa di più in un lavoro futuro?", 
            a: [
                {t:"Stare chiuso in un ufficio senza contatti umani.", p:{H:3, E:2}}, 
                {t:"Dover fare calcoli o compiti ripetitivi.", p:{A:2, U:2}}, 
                {t:"Non avere una logica chiara in quello che faccio.", p:{S:3, T:2}}
            ] 
        },
        { 
            q: "Scegli un superpotere:", 
            a: [
                {t:"Viaggiare nel tempo per vedere la storia.", p:{U:3, A:1}}, 
                {t:"Controllare ogni tecnologia col pensiero.", p:{T:3, S:1}}, 
                {t:"Risolvere istantaneamente conflitti tra persone.", p:{H:3, E:2}}
            ] 
        }
    ];

    let currentQ = 0;
    let scores = { S:0, U:0, E:0, A:0, T:0, H:0 };
    let scoreHistory = [];
    let wantsUni = true;

    function loadQuestion() {
        const q = questions[currentQ];
        document.getElementById("back-btn").disabled = currentQ === 0;
        
        const progress = (currentQ / questions.length) * 100;
        document.getElementById("progress-fill").style.width = `${progress}%`;
        
        document.getElementById("q-text").innerText = q.q;
        const optionsDiv = document.getElementById("q-options");
        optionsDiv.innerHTML = "";
        
        q.a.forEach(ans => {
            const btn = document.createElement("button");
            btn.innerText = ans.t;
            btn.onclick = () => {
                scoreHistory.push({ scores: JSON.parse(JSON.stringify(scores)), wantsUni: wantsUni });
                
                if (q.type === "uni_check") {
                    wantsUni = ans.val;
                } else {
                    for(let cat in ans.p) scores[cat] += ans.p[cat];
                }
                
                currentQ++;
                if (currentQ < questions.length) loadQuestion();
                else showResult();
            };
            optionsDiv.appendChild(btn);
        });
    }

    function goBack() {
        if (currentQ > 0) {
            currentQ--;
            const history = scoreHistory.pop();
            scores = history.scores;
            wantsUni = history.wantsUni;
            loadQuestion();
        }
    }

    function showResult() {
        document.getElementById("quiz").style.display = "none";
        document.getElementById("result").style.display = "block";

        const mapping = {
            S: "Scienze e Ricerca",
            U: "Umanistica e Lingue",
            E: "Economia e Diritto",
            A: "Arte e Design",
            T: "Tecnologia e Meccanica",
            H: "Sociale e Salute"
        };

        let sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]);
        const top3 = sorted.slice(0, 3);
        
        const topDiv = document.getElementById("top-materie");
        topDiv.innerHTML = "";
        top3.forEach(m => {
            topDiv.innerHTML += `<span class="materia-tag">${mapping[m[0]]}</span>`;
        });

        let winner = top3[0][0];
        let indirizzo = "";
        let desc = "";

        if (wantsUni) {
            if(winner === 'S') { indirizzo = "Liceo Scientifico"; desc = "Ideale per chi vuole scoprire le leggi del mondo e puntare a carriere mediche o ingegneristiche."; }
            else if(winner === 'U') { indirizzo = "Liceo Classico o Linguistico"; desc = "Perfetto per chi ama la storia, le parole e vuole capire le radici della nostra cultura."; }
            else if(winner === 'E') { indirizzo = "Liceo Economico Sociale (LES)"; desc = "Un mix moderno tra diritto, economia e scienze umane per capire la società attuale."; }
            else if(winner === 'A') { indirizzo = "Liceo Artistico"; desc = "Per chi ha bisogno di esprimersi visivamente e vuole studiare la storia della bellezza."; }
            else if(winner === 'T') { indirizzo = "Liceo Scientifico (Scienze Applicate)"; desc = "Tanta scienza e informatica, perfetto per chi punta a Informatica o Ingegneria pura."; }
            else if(winner === 'H') { indirizzo = "Liceo delle Scienze Umane"; desc = "Per chi vuole studiare la psicologia e la mente umana a livello teorico."; }
        } else {
            if(winner === 'S') { indirizzo = "IT Chimica o Biotecnologie"; desc = "Laboratorio puro. Impari subito ad analizzare sostanze e processi biologici."; }
            else if(winner === 'U') { indirizzo = "Tecnico per il Turismo"; desc = "Lingue applicate al lavoro e alla gestione del territorio."; }
            else if(winner === 'E') { indirizzo = "Tecnico Economico (AFM)"; desc = "Ragioneria, marketing e gestione aziendale. Impari a far quadrare i conti."; }
            else if(winner === 'A') { indirizzo = "IT Grafica e Comunicazione"; desc = "Trasforma la tua arte in lavoro digitale: video, pubblicità e web design."; }
            else if(winner === 'T') { indirizzo = "Tecnico Informatico o Meccanico"; desc = "Metti le mani sul codice o sui motori. Tecnologia pura pronta per il mercato."; }
            else if(winner === 'H') { indirizzo = "Professionale Socio-Sanitario"; desc = "Per chi vuole aiutare gli altri concretamente in strutture sanitarie o sociali."; }
        }

        document.getElementById("indirizzo-consigliato").innerText = indirizzo;
        document.getElementById("descrizione-indirizzo").innerText = desc;
    }

    loadQuestion();
</script>

</body>
</html>
