<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Up To You - Il Test di Orientamento Definitivo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #ff6600; 
            --primary-light: #ff8533;
            --bg: #0a0a0a; 
            --card: #1a1a1a; 
            --text: #e0e0e0;
            --accent: #4facfe;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            padding: 20px;
        }

        .quiz-container { 
            max-width: 800px; 
            width: 100%; 
            background: var(--card); 
            padding: 40px; 
            border-radius: 30px; 
            border: 1px solid #333; 
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
            position: relative;
            overflow: hidden;
        }

        .progress-container { margin-bottom: 30px; }
        .progress-bar { width: 100%; height: 8px; background: #222; border-radius: 10px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--accent), var(--primary)); transition: width 0.4s ease; }
        .step-info { font-size: 0.8rem; color: #666; margin-top: 8px; text-transform: uppercase; letter-spacing: 1px; }

        .question-box { min-height: 120px; }
        .question-box h2 { font-size: 1.6rem; font-weight: 600; line-height: 1.4; margin-bottom: 25px; color: #fff; }

        .options { display: grid; gap: 15px; }
        .options button { 
            background: #252525; 
            border: 1px solid #333; 
            color: #ccc; 
            padding: 18px 25px; 
            border-radius: 15px; 
            cursor: pointer; 
            text-align: left; 
            font-size: 1rem;
            display: flex;
            align-items: center;
        }

        .options button:hover { 
            background: #333; 
            border-color: var(--primary); 
            color: #fff; 
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255,102,0,0.2);
        }

        .nav-buttons { display: flex; justify-content: space-between; margin-top: 30px; align-items: center; }
        .btn-back { background: transparent; border: 1px solid #444; color: #888; padding: 10px 20px; border-radius: 10px; cursor: pointer; visibility: hidden; }
        .btn-back.visible { visibility: visible; }
        .btn-back:hover { border-color: #666; color: #fff; }

        #result { display: none; text-align: center; animation: fadeIn 0.8s ease forwards; }
        .result-title { font-size: 2rem; margin-bottom: 30px; background: linear-gradient(90deg, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .result-card { 
            background: #222; 
            border-radius: 20px; 
            padding: 25px; 
            margin-bottom: 20px; 
            text-align: left; 
            border-left: 5px solid var(--primary);
            position: relative;
            transition: 0.3s;
        }
        .result-card:hover {
            border-left-color: var(--accent);
            background: #2a2a2a;
            transform: scale(1.02);
        }
        .result-card.top { border-left-color: gold; background: #2a2a2a; }
        .rank { position: absolute; top: 15px; right: 20px; font-size: 0.7rem; color: var(--primary); font-weight: bold; text-transform: uppercase; }
        .result-card h3 { margin: 0 0 10px 0; color: #fff; font-size: 1.4rem; }
        .result-card p { margin: 0; font-size: 0.95rem; color: #aaa; line-height: 1.5; }

        .restart-btn { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 15px 40px; 
            border-radius: 15px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 20px; 
            font-size: 1rem;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

        </div>
    </div>

    // Funzione per mescolare un array (Fisher-Yates)
    function shuffleArray(array) {
        let curId = array.length;
        while (0 !== curId) {
            let randId = Math.floor(Math.random() * curId);
            curId -= 1;
            let tmp = array[curId];
            array[curId] = array[randId];
            array[randId] = tmp;
        }
        return array;
    }

    function initQuiz() {

        };

        // Prepariamo la coda: Q1 + Domande Base Mescolate
        questionQueue = [firstQuestion, ...shuffleArray([...baseQuestions])];
        loadQuestion();
    }

        q.a.forEach(ans => {
            const btn = document.createElement("button");
            btn.innerText = ans.t;
            btn.onclick = () => selectOption(ans);
            optionsBox.appendChild(btn);
        });

        const backBtn = document.getElementById("back-btn");
        if(currentStep > 0) backBtn.classList.add("visible");
        else backBtn.classList.remove("visible");
    }

  function selectOption(ans) {
    // Salva lo stato attuale per permettere di tornare indietro
    history.push({ 
        step: currentStep, 
        score: JSON.parse(JSON.stringify(score)), 
        uni: uniChoice,
        queueSnapshot: [...questionQueue],
        usedBranchesSnapshot: new Set(usedBranches) // Salviamo anche i rami usati
    });
    
    // Assegnazione punti o preferenza Uni
    if (questionQueue[currentStep].type === "uni") {
        uniChoice = ans.v;
    } else if (ans.p) {
        for(let key in ans.p) {
            score[key] += ans.p[key];
        }
    }

    // --- LOGICA BRANCHING CORRETTA ---
    if (ans.followUp && branchQuestions[ans.followUp]) {
        // Controlla se questo ramo è già stato inserito o mostrato
        if (!usedBranches.has(ans.followUp)) {
            const nextIndex = currentStep + 1;
            questionQueue.splice(nextIndex, 0, branchQuestions[ans.followUp]);
            usedBranches.add(ans.followUp); // Segna come "già prenotato/usato"
        }
    }

    currentStep++;
    if(currentStep < questionQueue.length) {
        loadQuestion();
    } else {
        showResults();
    }
}

   function goBack() {
    if(currentStep > 0) {
        const lastState = history.pop();
        currentStep = lastState.step;
        score = lastState.score;
        uniChoice = lastState.uni;
        questionQueue = lastState.queueSnapshot;
        usedBranches = lastState.usedBranchesSnapshot; // Ripristina i rami usati
        loadQuestion();
    }
}

    function showResults() {
        document.getElementById("quiz-ui").style.display = "none";
        document.getElementById("result").style.display = "block";
        document.getElementById("progress-fill").style.width = "100%";

        // Boost legato all'università
        if(uniChoice === "si") {
            for(let k in score) if(["CL","SC","SCA","SPO","LI","SU","LES","AR","MU"].includes(k)) score[k] += 15;
        } else if(uniChoice === "no") {
            for(let k in score) if(["ALB","SOC","MAN","MID","COM","SAN"].includes(k)) score[k] += 15;
        }

        // Ordinamento dei risultati
        let sorted = Object.entries(score).sort((a,b) => b[1] - a[1]);
        const top3 = sorted.slice(0, 3);
        
        const list = document.getElementById("results-list");
        list.innerHTML = "";

        top3.forEach((m, i) => {
            const data = descriptions[m[0]];
            const isTop = i === 0;
            
            list.innerHTML += `
                <a href="OGdata/indirizzi/${data.link}" target="_blank" style="text-decoration: none; display: block;">
                    <div class="result-card ${isTop ? 'top' : ''}">
                        <span class="rank">${i === 0 ? 'Miglior Match' : 'Alternativa'}</span>
                        <h3>${data.n}</h3>
                        <p>${data.d}</p>
                        <div style="margin-top: 15px; font-size: 0.9rem; color: var(--accent); font-weight: 600;">
                            Clicca per esplorare la pagina dell'indirizzo &rarr;
                        </div>
                    </div>
                </a>
            `;
        });
    }
