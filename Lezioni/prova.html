<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il Mio Profilo - Up to You</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
 <style>
    :root {
        --glass-bg: rgba(255, 255, 255, 0.03);
        --glass-border: rgba(255, 255, 255, 0.1);
        --text-main: #ffffff;
        --text-dim: #a0a0a0;
        /* IL NUOVO COLORE D'ACCENTO: Un blu saturo e moderno */
        --accent-blue: #1e62ff; 
        /* Un bianco brillante, non il colore principale */
        --accent-white: #ffffff;
    }

    body {
        background-color: #0a0a0a;
        color: var(--text-main);
    }

    .profile-grid {
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 40px;
        max-width: 1200px;
        margin: 120px auto 60px;
        padding: 0 20px;
    }

    /* SIDEBAR CON TOCCHI DI BLU */
    .profile-sidebar {
        background: var(--glass-bg);
        backdrop-filter: blur(30px);
        -webkit-backdrop-filter: blur(30px);
        border-radius: 32px;
        padding: 50px 30px;
        text-align: center;
        border: 1px solid var(--glass-border);
        height: fit-content;
        position: sticky;
        top: 100px;
        /* Leggerissimo bagliore blu di sfondo per dare profondità */
        box-shadow: 0 10px 40px rgba(30, 98, 255, 0.05);
    }

    .avatar-circle {
        width: 100px;
        height: 100px;
        background: #1a1a1a;
        border-radius: 40px;
        margin: 0 auto 25px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
        /* Bordo e icona blu per "accendere" il profilo */
        border: 2px solid var(--accent-blue);
        color: var(--accent-blue);
        box-shadow: 0 0 20px rgba(30, 98, 255, 0.2);
    }

    .profile-sidebar h2 {
        font-size: 1.6rem;
        font-weight: 700;
        margin-bottom: 5px;
        letter-spacing: -0.5px;
    }

    .badge-school {
        display: inline-block;
        /* Sfondo blu semitrasparente e testo blu */
        background: rgba(30, 98, 255, 0.1);
        color: var(--accent-blue);
        padding: 6px 16px;
        border-radius: 12px;
        font-size: 0.8rem;
        font-weight: 600;
        margin-top: 15px;
        border: 1px solid rgba(30, 98, 255, 0.3);
    }

    .edit-link {
        display: block;
        margin-top: 35px;
        padding: 14px;
        /* Il pulsante principale diventa BLU, molto più visibile */
        background: var(--accent-blue);
        color: #fff; /* Testo bianco sul blu */
        text-decoration: none;
        border-radius: 16px;
        font-weight: 600;
        font-size: 0.9rem;
        transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 4px 15px rgba(30, 98, 255, 0.2);
    }

    .edit-link:hover {
        transform: translateY(-3px);
        background: #1652d9; /* Un blu leggermente più scuro per l'hover */
        box-shadow: 0 6px 20px rgba(30, 98, 255, 0.3);
    }

    /* MAIN CONTENT CARDS CON ICONE COLORATE */
    .profile-main {
        display: flex;
        flex-direction: column;
        gap: 30px;
    }

    .content-card {
        background: var(--glass-bg);
        border-radius: 32px;
        padding: 40px;
        border: 1px solid var(--glass-border);
    }

    .content-card h3 {
        font-size: 1.2rem;
        font-weight: 700;
        margin-bottom: 30px;
        display: flex;
        align-items: center;
        gap: 15px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        color: #fff;
    }

    /* Le icone dei titoli diventano blu */
    .content-card h3 i {
        color: var(--accent-blue);
    }

    /* LIST DESIGN: I dettagli diventano blu all'hover */
    .list-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(255, 255, 255, 0.02);
        padding: 20px 25px;
        border-radius: 20px;
        margin-bottom: 12px;
        border: 1px solid transparent;
        transition: 0.3s;
    }

    .list-item:hover {
        background: rgba(30, 98, 255, 0.03); /* Hover blu chiarissimo */
        border-color: rgba(30, 98, 255, 0.1);
    }

    /* L'icona della lista diventa blu */
    .list-item i {
        color: var(--accent-blue);
        opacity: 0.6;
    }

    .comment-box {
        background: rgba(255, 255, 255, 0.02);
        padding: 25px;
        border-radius: 24px;
        /* La barra verticale diventa BLU */
        border-left: 3px solid var(--accent-blue);
        margin-bottom: 20px;
    }

    .comment-text {
        font-size: 0.95rem;
        line-height: 1.6;
        color: var(--text-dim);
    }

    @media (max-width: 950px) {
        .profile-grid { grid-template-columns: 1fr; margin-top: 100px; }
        .profile-sidebar { position: static; }
    }
</style>
</head>
<body class="auth-page">

<header>
    <nav class="navbar">
        <div class="logo">
            <a href="index.html" style="text-decoration: none; color: inherit;">
                UP<span>TOYOU</span>
            </a>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="contact.html">Contatti</a></li>
            <li id="auth-nav-item" class="nav-auth-container"></li>
        </ul>
    </nav>
</header>

<main class="profile-grid">
    <aside class="profile-sidebar">
        <div class="avatar-circle">
            <i class="fa-regular fa-user"></i>
        </div>
        <h2 id="prof-name">Nome Utente</h2>
        <p id="prof-email" style="color: var(--text-dim); font-size: 0.9rem;">caricamento...</p>
        
        <div id="prof-school-container">
            <span class="badge-school" id="prof-school-badge">Liceo Scientifico</span>
        </div>

        <hr style="border: 0; border-top: 1px solid var(--glass-border); margin: 35px 0;">
        
        <a href="settings.html" class="edit-link">Gestisci Profilo</a>
        <button onclick="supabaseClient.auth.signOut()" style="margin-top: 20px; background: none; border: none; color: #ff4d4d; cursor: pointer; font-size: 0.85rem; font-weight: 600;">Disconnetti</button>
    </aside>

    <div class="profile-main">
        
        <section class="content-card">
            <h3><i class="fa-regular fa-star"></i> Scuole Preferite</h3>
            <div id="favorites-list">
                <div class="list-item">
                    <span style="font-weight: 500;">Istituto Tecnico Tecnologico</span>
                    <i class="fa-solid fa-arrow-right-long" style="opacity: 0.3;"></i>
                </div>
                </div>
        </section>

        <section class="content-card">
            <h3><i class="fa-regular fa-comment"></i> Attività Recente</h3>
            <div id="comments-list">
                <div class="comment-box">
                    <p class="comment-text">"Ottima scuola, laboratori molto attrezzati e professori disponibili."</p>
                    <span style="font-size: 0.75rem; color: #555; margin-top: 10px; display: block;">Pubblicato il 12 Maggio 2026</span>
                </div>
            </div>
        </section>
        
    </div>
</main>

<footer>
    </footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SB_URL = 'https://ccvaevbvnqkfgoarutwx.supabase.co';
    const SB_KEY = 'sb_publishable_uXuSLaEAjNJwWJVJ3ywSDw_SB6YbMMo';
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    window.onload = async () => {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if(!session) { window.location.href = "login.html"; return; }

        const u = session.user;
        document.getElementById('prof-name').innerText = u.user_metadata.full_name || "Studente";
        document.getElementById('prof-email').innerText = u.email;
        // Correzione ID per matchare l'HTML
        document.getElementById('prof-school-badge').innerText = u.user_metadata.school_path || "Non specificata";
    };
</script>
</body>
</html>
