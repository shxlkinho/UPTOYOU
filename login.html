<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accedi - Up to You</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #5db9ff; 
            --primary-hover: #3b82f6; 
            --bg-gradient: radial-gradient(circle at center, #1e3a8a, #0f172a); 
            --card-bg: rgba(31, 41, 55, 0.45); 
            --text: #f8fafc; 
            --text-dim: #94a3b8;
            --input-bg: rgba(15, 23, 42, 0.6);
            --border-glow: rgba(93, 185, 255, 0.3);
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg-gradient); 
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            overflow-x: hidden;
        }

        /* ============================================================
           NAVBAR (DESKTOP DI BASE)
           ============================================================ */
        .navbar { 
            padding: 1.5rem 2rem; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: relative; 
            z-index: 10; 
            background: rgba(15, 23, 42, 0.2);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .logo { 
            font-size: 1.5rem; 
            font-weight: 800; 
            letter-spacing: -1px; 
            text-decoration: none;
            color: var(--text);
        }
        .logo span { color: var(--primary); }
        
        .nav-links {
            list-style: none; 
            display: flex; 
            align-items: center;
            gap: 2rem;
        }
        
        .nav-links a { 
            color: var(--text); 
            text-decoration: none; 
            font-weight: 500; 
            opacity: 0.8; 
            transition: var(--transition-smooth);
        }
        
        .nav-links a:hover {
            opacity: 1;
            color: var(--primary);
        }

        /* Dropdown Desktop */
        .dropdown { position: relative; }
        .dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: #111827;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            list-style: none;
            padding: 0.5rem 0;
            min-width: 180px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            margin-top: 0.5rem;
        }
        .dropdown-menu li a {
            padding: 0.5rem 1.5rem;
            display: block;
            font-size: 0.9rem;
        }
        .dropdown:hover .dropdown-menu {
            display: block;
        }

        /* Pulsante Hamburger (Nascosto su PC) */
        .hamburger-toggle {
            display: none;
            flex-direction: column;
            justify-content: space-between;
            width: 24px;
            height: 18px;
            background: transparent;
            border: none;
            cursor: pointer;
            z-index: 2000;
            padding: 0;
        }
        .hamburger-toggle span {
            width: 100%;
            height: 2px;
            background-color: var(--text);
            border-radius: 2px;
            transition: var(--transition-smooth);
        }

        /* ============================================================
           CONTENITORE LOGIN & CARD
           ============================================================ */
        .auth-container { 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 2rem; 
            position: relative; 
            z-index: 5;
        }

        /* Luce diffusa posteriore (No neon fastidioso) */
        .auth-container::before {
            content: "";
            position: absolute;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(93, 185, 255, 0.2) 0%, rgba(93, 185, 255, 0) 70%);
            border-radius: 50%;
            filter: blur(60px); 
            z-index: -1; 
        }

        .auth-card { 
            background: var(--card-bg); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            padding: 3rem 2.5rem; 
            border-radius: 24px; 
            width: 100%; 
            max-width: 420px; 
            text-align: center; 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3); 
        }

        .auth-card h2 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .auth-card p.subtitle {
            color: var(--text-dim);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        /* Input Styles */
        .input-group { 
            margin-bottom: 1.2rem; 
            text-align: left; 
        }
        
        input { 
            width: 100%; 
            padding: 1rem 1.2rem; 
            background: var(--input-bg); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 14px; 
            color: white; 
            font-family: inherit;
            font-size: 0.95rem;
            transition: var(--transition-smooth);
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 12px var(--border-glow);
            background: rgba(15, 23, 42, 0.8);
        }
        
        /* Bottone Principale */
        .btn-primary { 
            width: 100%; 
            padding: 1rem; 
            background: var(--primary); 
            color: #0f172a; 
            border: none; 
            border-radius: 14px; 
            font-weight: 600; 
            font-size: 1rem;
            letter-spacing: 0.5px;
            cursor: pointer; 
            margin-top: 0.8rem; 
            transition: var(--transition-smooth);
            box-shadow: 0 4px 15px rgba(93, 185, 255, 0.2);
        }
        
        .btn-primary:hover { 
            background: #fff; 
            color: #0f172a;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 255, 255, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* Divisore */
        .divider { 
            margin: 1.8rem 0; 
            display: flex; 
            align-items: center; 
            color: var(--text-dim);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .divider::before, .divider::after { 
            content: ""; 
            flex: 1; 
            height: 1px; 
            background: rgba(255, 255, 255, 0.1); 
        }
        .divider span { padding: 0 10px; opacity: 0.7; }
        
        /* Footer Card */
        .footer-text { 
            margin-top: 1rem; 
            font-size: 0.9rem; 
            color: var(--text-dim);
        }
        .footer-text a { 
            color: var(--primary); 
            text-decoration: none; 
            font-weight: 600; 
            transition: var(--transition-smooth);
        }
        .footer-text a:hover { text-decoration: underline; }

        #status-msg {
            margin-top: 1rem;
            font-size: 0.9rem;
        }

        /* ============================================================
           MEDIA QUERY: RESPONSIVE PER MOBILE (SOTTO I 968px)
           ============================================================ */
        @media (max-width: 968px) {
            .navbar {
                padding: 15px 20px !important;
            }

            .hamburger-toggle {
                display: flex !important;
            }

            /* Animazione Hamburger in "X" */
            .hamburger-toggle.active span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
            .hamburger-toggle.active span:nth-child(2) { opacity: 0; }
            .hamburger-toggle.active span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

            .nav-links {
                position: fixed;
                top: 0;
                right: -100%; 
                width: 75%;
                max-width: 300px;
                height: 100vh;
                background: rgba(10, 10, 10, 0.98);
                backdrop-filter: blur(25px);
                -webkit-backdrop-filter: blur(25px);
                flex-direction: column;
                align-items: flex-start !important;
                justify-content: flex-start;
                padding: 100px 30px 40px 30px !important;
                gap: 24px !important;
                box-shadow: -10px 0 30px rgba(0,0,0,0.5);
                transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
                z-index: 1900;
            }

            .nav-links.active { right: 0 !important; }

            .nav-links .dropdown { width: 100% !important; }

            .nav-links .dropdown-menu {
                display: none !important; 
                position: relative !important;
                box-shadow: none !important;
                background: rgba(255, 255, 255, 0.03) !important;
                padding: 10px 0 10px 15px !important;
                margin-top: 8px !important;
                border-radius: 8px !important;
                border: none !important;
                border-left: 2px solid var(--primary) !important;
                flex-direction: column !important;
                gap: 12px !important;
            }

            .nav-links .dropdown:hover .dropdown-menu,
            .nav-links .dropdown:focus-within .dropdown-menu {
                display: flex !important;
            }

            .nav-links .dropdown-menu li a {
                padding: 5px 0 !important;
                color: var(--text-dim) !important;
            }
            
            .auth-card {
                padding: 2.5rem 1.8rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">UP<span>TOYOU</span></a>

            <button class="hamburger-toggle" id="mobile-menu-btn" aria-label="Apri menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            
            <ul class="nav-links" id="nav-links-container">
                <li><a href="index.html">Home</a></li>
                <li class="dropdown">
                    <a href="#">Lezioni ▾</a>
                    <ul class="dropdown-menu">
                        <li><a href="Lezioni/elementari.html">Elementari</a></li>
                        <li><a href="Lezioni/medie.html">Medie</a></li>
                        <li><a href="Lezioni/superiori.html">Superiori</a></li>
                    </ul>
                </li>
                <li class="dropdown">
                    <a href="#">Orientamento ▾</a>
                    <ul class="dropdown-menu">
                        <li><a href="guidato.html">Orientamento Guidato</a></li>
                        <li><a href="rapido.html">Orientamento Rapido</a></li>
                    </ul>
                </li>
                <li><a href="contact.html">Contatti</a></li>
                <li><a href="#about">Chi Siamo</a></li>
                <li id="auth-nav-item" class="nav-auth-container"></li>
            </ul>
        </nav>
    </header>

    <main class="auth-container">
        <div class="auth-card">
            <h2>Bentornato</h2>
            <p class="subtitle">Accedi per continuare il tuo viaggio.</p>

            <div class="input-group">
                <input type="email" id="email" placeholder="Email" autocomplete="email">
            </div>

            <div class="input-group">
                <input type="password" id="password" placeholder="Password">
            </div>
            
            <button class="btn-primary" id="loginBtn">ACCEDI</button>

            <div class="divider"><span>oppure</span></div>

            <p class="footer-text">
                Non hai un account? <a href="register.html">Registrati ora</a>
            </p>
            <div id="status-msg"></div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = 'https://ccvaevbvnqkfgoarutwx.supabase.co';
        const SB_KEY = 'sb_publishable_uXuSLaEAjNJwWJVJ3ywSDw_SB6YbMMo';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        document.getElementById('loginBtn').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('status-msg');

            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) msg.innerHTML = `<span style="color:#f87171">${error.message}</span>`;
            else window.location.href = 'index.html';
        };

        // Tasto Invio per il Submit
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                document.getElementById('loginBtn').click();
            }
        });

        // Gestione Menu Mobile
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const navLinksContainer = document.getElementById('nav-links-container');

        if (mobileMenuBtn && navLinksContainer) {
            mobileMenuBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                mobileMenuBtn.classList.toggle('active');
                navLinksContainer.classList.toggle('active');
            });

            document.addEventListener('click', (e) => {
                if (navLinksContainer.classList.contains('active') && 
                    !navLinksContainer.contains(e.target) && 
                    !mobileMenuBtn.contains(e.target)) {
                    
                    mobileMenuBtn.classList.remove('active');
                    navLinksContainer.classList.remove('active');
                }
            });
        } 
    </script>
</body>
</html>
