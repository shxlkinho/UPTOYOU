<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accedi - Up to You</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            /* Colore primario azzurro come stabilito precedentemente */
            --primary: #5db9ff; 
            --primary-hover: #ffffff; 
            
            /* Sfondo generale leggermente meno scuro (blu notte invece che quasi nero) */
            --bg: #111827; 
            
            /* Contenitore leggermente più trasparente per far passare la luce */
            --card-bg: rgba(31, 41, 55, 0.6); 
            --text: #f8fafc; 
        }

/* ============================================================
   STILI HAMBURGER MENU & RESPONSIVE NAVBAR
   ============================================================ */

/* Pulsante Hamburger - Nascosto su PC */
.hamburger-toggle {
    display: none;
    flex-direction: column;
    justify-content: space-between;
    width: 24px;
    height: 18px;
    background: transparent;
    border: none;
    cursor: pointer;
    z-index: 2000; /* Superiore a tutto */
    padding: 0;
}

.hamburger-toggle span {
    width: 100%;
    height: 2px;
    background-color: var(--text-main);
    border-radius: 2px;
    transition: var(--transition-smooth);
}

/* Animazione in "X" quando attivo */
.hamburger-toggle.active span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
.hamburger-toggle.active span:nth-child(2) { opacity: 0; }
.hamburger-toggle.active span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

/* Schermi Mobile e Tablet (sotto i 968px) */
@media (max-width: 968px) {
    /* Forza la navbar a disporsi in riga e spingere gli elementi ai lati */
    .navbar {
        display: flex !important;
        flex-direction: row !important;
        align-items: center !important;
        justify-content: space-between !important;
        width: 100% !important;
        padding: 15px 20px !important; /* Spazio interno per non appiccicare il logo ai bordi */
        box-sizing: border-box !important;
    }

    /* Forza l'hamburger ad andare tutto a destra */
    .hamburger-toggle {
        display: flex !important;
        margin-left: auto !important; 
        position: relative !important;
        z-index: 2000 !important;
    }

    /* Il menu laterale a comparsa */
    .nav-links {
        position: fixed;
        top: 0;
        right: -100%; /* Nascosto a destra */
        width: 75%;
        max-width: 300px;
        height: 100vh;
        background: rgba(10, 10, 10, 0.98);
        backdrop-filter: blur(25px);
        border-left: 1px solid rgba(255, 255, 255, 0.05);
        flex-direction: column;
        align-items: flex-start !important;
        justify-content: flex-start;
        padding: 100px 30px 40px 30px !important;
        gap: 24px !important;
        box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        z-index: 1900;
        margin: 0;
    }

    .nav-links.active {
        right: 0 !important; 
    }

    .nav-auth-buttons {
        flex-direction: column;
        width: 100%;
        gap: 10px;
    }
    .nav-auth-buttons a {
        width: 100%;
        text-align: center;
        box-sizing: border-box;
    }
    
   .nav-links .dropdown {
        position: relative !important;
        width: 100% !important;
    }

    /* Di base la tendina su mobile è nascosta */
    .nav-links .dropdown-menu {
        display: none !important; 
        position: relative !important;
        top: 0 !important;
        left: 0 !important;
        box-shadow: none !important;
        background: rgba(255, 255, 255, 0.03) !important;
        padding: 10px 0 10px 15px !important;
        margin-top: 8px !important;
        border-radius: 8px !important;
        border: none !important;
        border-left: 2px solid var(--accent) !important;
        flex-direction: column !important;
        gap: 12px !important;
    }

    /* Mostra la tendina SOLO quando si passa sopra con il dito/mouse sulla voce principale */
    .nav-links .dropdown:hover .dropdown-menu,
    .nav-links .dropdown:focus-within .dropdown-menu {
        display: flex !important;
    }

    .nav-links .dropdown-menu li {
        width: 100% !important;
    }

    .nav-links .dropdown-menu li a {
        font-size: 0.95rem !important;
        color: var(--text-dim) !important;
        padding: 5px 0 !important;
    }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            
            /* --- MODIFICA SFONDO --- */
            /* Gradient radiale più chiaro al centro per schiarire l'ambiente generale */
            background: radial-gradient(circle at center, #1e3a8a, #0f172a); 
            
            color: var(--text); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            position: relative; /* Per posizionare la luce di sfondo */
            overflow-x: hidden; /* Evita scorrimenti indesiderati dovuti alla luce */
        }

        /* Navbar invariata come richiesto (struttura e posizionamento) */
        .navbar { padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 10; }
        .logo { font-size: 1.5rem; font-weight: 800; letter-spacing: -1px; }
        .logo span { color: var(--primary); }
        .nav-links {list-style: none; margin: 0; padding: 0; display: flex; /* Se vuoi i link sulla stessa linea */
}
        .nav-links a { color: var(--text); text-decoration: none; font-weight: 500; opacity: 0.8; }
        
        .auth-container { 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 2rem; 
            position: relative; /* Contesto per la luce */
            z-index: 5;
        }

        /* --- EFFETTO LUCE DIFFUSA (NON NEON) --- */
        /* Questo elemento crea un alone morbido e ampio dietro la card */
        .auth-container::before {
            content: "";
            position: absolute;
            width: 500px;
            height: 500px;
            /* Colore luce azzurro molto tenue e sfocato */
            background: radial-gradient(circle, rgba(59, 130, 246, 0.25) 0%, rgba(59, 130, 246, 0) 70%);
            border-radius: 50%;
            /* Forte sfocatura per eliminare bordi definiti (effetto neon) */
            filter: blur(80px); 
            z-index: -1; /* Dietro la card */
        }

        .auth-card { 
            background: var(--card-bg); 
            backdrop-filter: blur(16px); /* Blur aumentato per effetto vetro */
            border: 1px solid rgba(255,255,255,0.08); 
            padding: 2.5rem; 
            border-radius: 24px; 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
            /* Leggerissima ombra proiettata per dare profondità rispetto alla luce posteriore */
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2); 
        }

        /* Input, bottoni, divider e footer invariati come richiesto */
        .input-group { margin-bottom: 1.2rem; text-align: left; }
        input { width: 100%; padding: 0.8rem 1rem; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; box-sizing: border-box; }
        .btn-primary { width: 100%; padding: 1rem; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; margin-top: 1rem; transition: background 0.3s ease; }
        .btn-primary:hover { background: var(--primary-hover); }
        .divider { margin: 1.5rem 0; display: flex; align-items: center; opacity: 0.3; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: white; margin: 0 10px; }
        .footer-text { margin-top: 1.5rem; font-size: 0.85rem; }
        .footer-text a { color: var(--primary); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">UP<span>TOYOU</span></div>

	<button class="hamburger-toggle" id="mobile-menu-btn" aria-label="Apri menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
                    <ul class="nav-links" id="nav-links-container">
            <li><a href="index.html">Home</a></li>
            <li class="dropdown">
                <a href="#">Lezioni ▾</a>
                <ul class="dropdown-menu">
                    <li><a href="Lezioni/elementari.html">Elementari</a></li>
                    <li><a href="Lezioni/medie.html">Medie</a></li>
                    <li><a href="Lezioni/superiori.html">Superiori</a></li>
                </ul>
            </li>
            <li class="dropdown">
                <a href="#">Orientamento ▾</a>
                <ul class="dropdown-menu">
                    <li><a href="guidato.html">Orientamento Guidato</a></li>
                    <li><a href="rapido.html">Orientamento Rapido</a></li>
                </ul>
            </li>
            <li><a href="contact.html">Contatti</a></li>
            <li><a href="#about">Chi Siamo</a></li>
            <li id="auth-nav-item" class="nav-auth-container"></li>
        </ul>
    </nav>

    </header>

    <main class="auth-container">
        <div class="auth-card">
            <h2>Bentornato</h2>
            <p>Accedi per continuare il tuo viaggio.</p>

            <div class="input-group">
                <input type="email" id="email" placeholder="Email">
            </div>

            <div class="input-group">
                <input type="password" id="password" placeholder="Password">
            </div>
            
            <button class="btn-primary" id="loginBtn">ACCEDI</button>

            <div class="divider"><span>oppure</span></div>

            <p class="footer-text">
                Non hai un account? <a href="register.html">Registrati ora</a>
            </p>
            <div id="status-msg"></div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = 'https://ccvaevbvnqkfgoarutwx.supabase.co';
        const SB_KEY = 'sb_publishable_uXuSLaEAjNJwWJVJ3ywSDw_SB6YbMMo';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        document.getElementById('loginBtn').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('status-msg');

            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) msg.innerHTML = `<span style="color:#f87171">${error.message}</span>`;
            else window.location.href = 'index.html';
        };
        // --- AGGIUNTA TASTO INVIO ---
    document.addEventListener('keydown', function(event) {
        if (event.key === 'Enter') {
            document.getElementById('loginBtn').click();
        }
    });


const mobileMenuBtn = document.getElementById('mobile-menu-btn');
const navLinksContainer = document.getElementById('nav-links-container');

if (mobileMenuBtn && navLinksContainer) {
    mobileMenuBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        mobileMenuBtn.classList.toggle('active');
        navLinksContainer.classList.toggle('active');
    });

    // Chiude se clicchi fuori
    document.addEventListener('click', (e) => {
        if (navLinksContainer.classList.contains('active') && 
            !navLinksContainer.contains(e.target) && 
            !mobileMenuBtn.contains(e.target)) {
            
            mobileMenuBtn.classList.remove('active');
            navLinksContainer.classList.remove('active');
        }
    });
} 
    </script>
</body>
</html>
