        <div class="hero-text-top"><h1>Tecnologia</h1><p class="subtitle-desc">La tecnologia e l'applicazione pratica dell'ingegno umano per creare strumenti che facilitino la vita. Insegna a capire come funzionano gli oggetti, integrando disegno tecnico, energia e materiali. Studiare tecnologia significa imparare a progettare e comprendere l'impatto dell'innovazione. Alle superiori, si specializza in settori come meccanica, elettronica e informatica, offrendo sbocchi immediati nell'industria 4.0. Essere tecnologicamente alfabetizzati e una competenza base per non subire il progresso, ma diventarne protagonisti. Unisce creativita e rigore tecnico per costruire un mondo piu efficiente e connesso. In un futuro dove l'intelligenza artificiale e la robotica saranno onnipresenti, avere una solida base tecnologica ti permettera di non essere sostituito dalle macchine, ma di essere colui che le progetta, le controlla e le ripara, garantendoti un posto di rilievo nel mercato del lavoro di domani.</p></div>
