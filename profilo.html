<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il Mio Profilo - Up to You</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <header>
        <nav class="navbar">
            <div class="logo">UP<span>TOYOU</span></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="settings.html">Impostazioni</a></li>
            </ul>
        </nav>
    </header>

   <!-- profilo.html -->
<style>
    .profile-grid {
        display: grid;
        grid-template-columns: 300px 1fr;
        gap: 30px;
        max-width: 1200px;
        margin: 40px auto;
        padding: 0 20px;
    }

    .profile-sidebar {
        background: rgba(22, 22, 22, 0.6);
        backdrop-filter: blur(20px);
        border-radius: 24px;
        padding: 30px;
        text-align: center;
        border: 1px solid rgba(79, 172, 254, 0.2);
        height: fit-content;
    }

    .profile-main {
        display: flex;
        flex-direction: column;
        gap: 25px;
    }

    .content-card {
        background: rgba(255, 255, 255, 0.03);
        border-radius: 20px;
        padding: 25px;
        border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .content-card h3 {
        color: var(--accent);
        margin-bottom: 15px;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .badge-school {
        background: var(--accent);
        color: white;
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: 700;
    }

    .comment-item {
        border-left: 2px solid var(--accent-sec);
        padding-left: 15px;
        margin-bottom: 15px;
        font-size: 0.9rem;
    }
</style>

<main class="profile-grid">
    <!-- Sidebar con Info Base -->
    <aside class="profile-sidebar">
        <div style="font-size: 5rem; margin-bottom: 15px;">👤</div>
        <h2 id="prof-name">Nome Utente</h2>
        <p id="prof-email" style="color: var(--text-dim); font-size: 0.9rem;">email@esempio.it</p>
        <div style="margin-top: 20px;">
            <span class="badge-school" id="prof-school-badge">Liceo Scientifico</span>
        </div>
        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 25px 0;">
        <a href="settings.html" class="edit-link">Modifica Profilo</a>
    </aside>

    <!-- Main Content -->
    <div class="profile-main">
        <!-- Scuole Preferite -->
        <section class="content-card">
            <h3>⭐ Scuole Preferite</h3>
            <div id="favorites-list" style="color: var(--text-dim);">
                Non hai ancora salvato scuole nei preferiti.
            </div>
        </section>

        <!-- Ultimi Commenti -->
        <section class="content-card">
            <h3>💬 I tuoi Commenti</h3>
            <div id="comments-list">
                <div class="comment-item">
                </div>
            </div>
        </section>
    </div>
</main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = 'https://ccvaevbvnqkfgoarutwx.supabase.co';
        const SB_KEY = 'sb_publishable_uXuSLaEAjNJwWJVJ3ywSDw_SB6YbMMo';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if(!session) { window.location.href = "login.html"; return; }

            const u = session.user;
            document.getElementById('prof-name').innerText = u.user_metadata.full_name || "Studente";
            document.getElementById('prof-email').innerText = u.email;
            document.getElementById('prof-school').innerText = u.user_metadata.school_path || "Non specificata";
        };
    </script>
</body>
</html>
